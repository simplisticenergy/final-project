# ==============================================================================
# Log Management Stack
#
# Architecture:
#   sample-app (httpd)  -->  writes access/error logs to a shared volume
#                              (apache-logs)
#   forwarder (universalforwarder)
#     - reads the same apache-logs volume
#     - tails/monitors the log files
#     - forwards events to splunk:9997 (the Splunk forwarder receiving port)
#   splunk (indexer + search head)
#     - receives forwarded data on 9997
#     - indexes it to a persistent named volume (splunk-var)
#     - exposes the Splunk Web UI on 8000
#
# All three services share a common bridge network, "logging-net", so they
# can resolve each other by service name (e.g. "splunk", "forwarder").
#
# Secrets (e.g. SPLUNK_PASSWORD) are supplied via a .env file that is NOT
# committed to source control. See .env.example for the required variables.
#
# The forwarder's outputs.conf/inputs.conf/props.conf are bind-mounted
# read-only from ../splunk-config into $SPLUNK_HOME/etc/system/local/,
# so its forwarding/monitoring/sourcetype config is version-controlled
# instead of baked into the image or configured by hand.
# ==============================================================================

services:
  splunk:
    image: splunk/splunk:latest
    container_name: splunk
    hostname: splunk
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
    ports:
      - "8000:8000"   # Splunk Web UI
      - "9997:9997"   # Forwarder receiving port
    volumes:
      - splunk-var:/opt/splunk/var
      # Version-controlled Splunk app holding the scheduled alert
      # (savedsearches.conf). Saved searches run on the indexer/search
      # head, not the forwarder, so this is mounted here rather than
      # into splunk-config/. Directory mount, read-write, for the same
      # reasons as the forwarder's config mount (chown + atomic-rename
      # in the entrypoint); Splunk may write runtime state into local/
      # inside the app, which is gitignored.
      - ../splunk-apps/webapp_alerts:/opt/splunk/etc/apps/webapp_alerts
    networks:
      - logging-net
    restart: unless-stopped

  forwarder:
    image: splunk/universalforwarder:latest
    container_name: forwarder
    hostname: forwarder
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
    volumes:
      - apache-logs:/var/log/apache2:ro
      # Mount the whole directory, not individual files, and NOT :ro.
      # The forwarder's ansible-driven entrypoint (1) chowns everything
      # under $SPLUNK_HOME on every startup - fails fatally on a :ro mount -
      # and (2) rewrites inputs.conf itself via write-temp-then-rename,
      # which errors with EBUSY when the target is a single bind-mounted
      # file (rename can't replace a mount point). Mounting the directory
      # avoids both: files inside a mounted directory are ordinary files
      # from the container's point of view.
      - ../splunk-config:/opt/splunkforwarder/etc/system/local
    networks:
      - logging-net
    depends_on:
      - splunk
    restart: unless-stopped

  sample-app:
    image: httpd:latest
    container_name: sample-app
    hostname: sample-app
    ports:
      - "127.0.0.1:80:80"   # bound to localhost only - curl from the EC2 VM itself, not exposed to the internet
    # The official httpd image logs to /proc/self/fd/1 and /proc/self/fd/2
    # (stdout/stderr) by default, so nothing ever lands in the logs/ dir
    # for the forwarder to tail. Point CustomLog/ErrorLog at real files
    # in the mounted volume instead, using combined format so it matches
    # the access_combined sourcetype in inputs.conf/props.conf.
    command: >
      sh -c "sed -i 's#CustomLog /proc/self/fd/1 common#CustomLog \"logs/access_log\" combined#' conf/httpd.conf &&
             sed -i 's#ErrorLog /proc/self/fd/2#ErrorLog \"logs/error_log\"#' conf/httpd.conf &&
             exec httpd-foreground"
    volumes:
      - apache-logs:/usr/local/apache2/logs
    networks:
      - logging-net
    restart: unless-stopped

networks:
  logging-net:
    driver: bridge

volumes:
  splunk-var:
  apache-logs:
