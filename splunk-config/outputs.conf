# outputs.conf
#
# Configures this Universal Forwarder to ship data to the indexer
# (the "splunk" container) over the Splunk-to-Splunk (S2S) protocol
# on its forwarder receiving port, 9997.
#
# Deployed to: $SPLUNK_HOME/etc/system/local/outputs.conf on the
# forwarder container.

[tcpout]
# Which target group(s) the forwarder uses by default for all forwarded data.
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
# One or more indexers to load-balance across. Only one indexer (splunk:9997)
# exists in this stack, but autolb keeps this ready to scale to multiple
# indexers later by just adding more comma-separated server entries.
server = splunk:9997

# Compress data on the wire between forwarder and indexer.
compressed = true

[tcpout-server://splunk:9997]
# Per-indexer override stanza (none needed today; present as a placeholder
# for future TLS/cert settings, e.g. clientCert/sslPassword).
[indexAndForward]
index = false
