# inputs.conf
#
# Configures this Universal Forwarder to monitor the Apache log files
# written by the "sample-app" container. Those logs land in the shared
# "apache-logs" volume, which this forwarder mounts read-only at
# /var/log/apache2 (see docker-compose.yml). httpd's default combined
# log format writes to access_log / error_log (no file extension).
#
# If you instead point this at a distro-packaged Apache install, the
# equivalent path is typically /var/log/httpd/access_log and
# /var/log/httpd/error_log — swap the paths below accordingly.
#
# Deployed to: $SPLUNK_HOME/etc/system/local/inputs.conf on the
# forwarder container.

[monitor:///var/log/apache2/access_log]
# Apache access log (combined log format) -> access_combined sourcetype.
sourcetype = access_combined
index = webapp_logs
disabled = false

[monitor:///var/log/apache2/error_log]
# Apache error log -> httpd_error sourcetype.
sourcetype = httpd_error
index = webapp_logs
disabled = false
