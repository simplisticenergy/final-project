# props.conf
#
# Source type definitions for the Apache logs forwarded from sample-app.
#
# access_combined is one of Splunk's built-in sourcetypes, so line-breaking
# and timestamp extraction already work out of the box for standard Apache
# combined log format. It's listed below only for documentation/override
# purposes in case defaults ever need tuning.
#
# httpd_error is a custom sourcetype (not a Splunk built-in), so it needs
# explicit line-breaking and timestamp extraction rules for Apache's
# standard error log format, e.g.:
#   [Wed Oct 11 14:32:52 2025] [error] [client 127.0.0.1] some error message
#
# Deployed to: $SPLUNK_HOME/etc/system/local/props.conf on the
# forwarder container.

[access_combined]
# Built-in sourcetype for Apache/NCSA combined access log format.
# No overrides required today; left here as a placeholder for future tuning.
SHOULD_LINEMERGE = false

[httpd_error]
# Each error log entry starts with a bracketed timestamp, e.g. "[Wed Oct 11 ...]".
# One event per line; no multi-line merging needed for standard error format.
SHOULD_LINEMERGE = false

# A new event begins at each line that opens with "[<weekday> <month>".
LINE_BREAKER = ([\r\n]+)\[\w{3} \w{3}

# Timestamp appears at the very start of the line inside brackets.
TIME_PREFIX = ^\[
TIME_FORMAT = %a %b %d %H:%M:%S %Y

# Don't scan far into the line looking for the timestamp; it's always at the start.
MAX_TIMESTAMP_LOOKAHEAD = 28
