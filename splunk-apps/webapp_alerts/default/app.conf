# app.conf for the webapp_alerts app — holds the scheduled alert(s)
# defined in savedsearches.conf. Not a UI app, so it's hidden from the
# app launcher (is_visible = 0); the alert still runs on schedule.

[install]
is_configured = 1
state = enabled

[ui]
is_visible = 0
label = Webapp Alerts

[launcher]
author = David DeWeese
description = Scheduled alerts for the webapp_logs index (sample-app Apache logs)
version = 1.0.0

[package]
id = webapp_alerts
