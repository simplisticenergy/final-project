# savedsearches.conf
#
# Scheduled alert(s) for the webapp_logs index. This file lives in the
# version-controlled "webapp_alerts" Splunk app, which docker-compose.yml
# bind-mounts into the indexer at /opt/splunk/etc/apps/webapp_alerts
# (saved searches run on the search head / indexer, NOT the forwarder,
# which is why this is a separate mount from splunk-config/).
#
# The alert reuses the dashboard's error-rate search and its red
# threshold (>15%), and fires only when there are at least 10 requests
# in the window so a single 404 against near-zero traffic doesn't page.
#
# Action: alert.track=1 records firings under Activity -> Triggered
# Alerts in Splunk Web. No email/webhook action is configured because
# this stack has no SMTP server; to add one later, set action.email.*
# here (plus SMTP settings in Splunk) or edit the alert in the UI.

[Webapp High Error Rate (4xx/5xx)]
description = Fires when 4xx/5xx responses exceed 15% of requests to the sample app over the last 15 minutes (minimum 10 requests).
search = index=webapp_logs sourcetype=access_combined \
| rex field=_raw "\"\S+ \S+ \S+\" (?<status>\d{3})" \
| eval is_error=if(status>=400,1,0) \
| stats count as requests, avg(is_error) as error_rate \
| eval error_rate=round(error_rate*100,2) \
| where requests>=10 AND error_rate>15

# Run every 5 minutes over a sliding 15-minute window.
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *

# Trigger when the search returns any result (the search itself only
# emits a row when the threshold condition is met).
counttype = number of events
relation = greater than
quantity = 0

# Record firings in Activity -> Triggered Alerts; severity 4 = High.
alert.track = 1
alert.severity = 4

# Throttle: once triggered, stay quiet for 30 minutes so a sustained
# error storm produces one triggered alert, not one every 5 minutes.
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 30m

disabled = 0
