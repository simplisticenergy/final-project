# indexes.conf
#
# Defines the webapp_logs index the forwarder targets (see
# splunk-config/inputs.conf). The index was originally created by hand
# in Splunk Web, which stores the definition under /opt/splunk/etc -
# and etc/ is NOT on a named volume, so recreating the splunk container
# (docker compose down/up, or any compose config change) silently wiped
# the definition while the actual bucket data survived on the
# splunk-var volume. Events forwarded to a nonexistent index are
# dropped. Defining the index here, in the version-controlled app
# mounted into etc/apps/, makes it survive any container recreation and
# re-attaches the existing buckets in $SPLUNK_DB/webapp_logs.

[webapp_logs]
homePath = $SPLUNK_DB/webapp_logs/db
coldPath = $SPLUNK_DB/webapp_logs/colddb
thawedPath = $SPLUNK_DB/webapp_logs/thaweddb
